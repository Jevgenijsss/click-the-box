<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Box</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="game-title">Click The Box Game</h1>
        <div class="score-timer">
            <p class="score">Score: <span id="score-amount">0</span></p>
            <p class="timer">Time Left: <span id="time-left">30</span> seconds</p>
        </div>
    </header>
    <div id="box">
        <p class="box-text">Click Me!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
